name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch + dependencies
        id: install
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e . --config-settings editable_mode=compat
          python -c "import pandas, PIL, torch, torchvision, timm; print('core deps OK')"

      - name: Run dataset tests
        if: always() && steps.install.conclusion == 'success'
        run: pytest tests/test_dataset.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run model tests
        if: always() && steps.install.conclusion == 'success'
        run: pytest tests/test_models.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run XAI tests
        if: always() && steps.install.conclusion == 'success'
        run: pytest tests/test_xai.py
        env:
          PYTHONPATH: ${{ github.workspace }}
