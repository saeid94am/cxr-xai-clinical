name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        id: install
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          python -c "import pandas, PIL, torch, torchvision, timm; print('core deps OK')"

      - name: Verify src imports
        if: always() && steps.install.conclusion == 'success'
        run: |
          python - <<'EOF'
          import sys, importlib.util
          print("sys.path:", sys.path)
          for name in ("src", "src.data", "src.data.dataset", "src.data.transforms",
                       "src.models", "src.models.classifier"):
              try:
                  spec = importlib.util.find_spec(name)
                  print(f"  find_spec({name!r}): {spec}")
              except Exception as e:
                  print(f"  find_spec({name!r}): ERROR {e}")
          import traceback
          for name in ("src.data", "src.models"):
              try:
                  __import__(name)
                  print(f"  import {name}: OK")
              except Exception:
                  print(f"  import {name}: FAILED")
                  traceback.print_exc()
          EOF
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run dataset tests
        if: always() && steps.install.conclusion == 'success'
        run: python -m pytest tests/test_dataset.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run model tests
        if: always() && steps.install.conclusion == 'success'
        run: python -m pytest tests/test_models.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run XAI tests
        if: always() && steps.install.conclusion == 'success'
        run: python -m pytest tests/test_xai.py
        env:
          PYTHONPATH: ${{ github.workspace }}
