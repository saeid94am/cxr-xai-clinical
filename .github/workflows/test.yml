name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch + dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Debug package imports
        run: |
          python - <<'EOF'
          import sys, traceback
          print("Python:", sys.version)
          print("sys.path:", sys.path[:6])
          for pkg in ("src", "src.data", "src.models", "src.training", "src.xai", "src.evaluation", "src.utils"):
              try:
                  m = __import__(pkg)
                  print(f"OK  {pkg}: {getattr(m, '__file__', '<namespace>')}")
              except Exception as exc:
                  print(f"FAIL {pkg}: {exc!r}")
                  traceback.print_exc()
          EOF

      - name: Run dataset tests
        run: pytest tests/test_dataset.py

      - name: Run model tests
        run: pytest tests/test_models.py

      - name: Run XAI tests
        run: pytest tests/test_xai.py
