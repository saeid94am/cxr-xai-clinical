site_name: CXR-XAI-Clinical
site_description: Explainable AI for Chest X-Ray Pathology Classification
site_url: https://saeid94am.github.io/cxr-xai-clinical/
repo_url: https://github.com/saeid94am/cxr-xai-clinical
repo_name: saeid94am/cxr-xai-clinical

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Data Setup: getting-started/data.md
  - Training: training.md
  - XAI Methods: xai.md
  - Evaluation: evaluation.md
  - API Reference: api.md
