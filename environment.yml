name: cxr-xai
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # PyTorch (GPU) — swap the pip block below for CPU-only if needed
  - pytorch::pytorch>=2.1.0
  - pytorch::torchvision>=0.16.0
  - pytorch::pytorch-cuda=12.1
  - pip:
      - timm>=0.9.12
      - pytorch-grad-cam>=1.5.0
      - captum>=0.7.0
      - quantus>=0.5.0
      - numpy>=1.24.0
      - pandas>=2.0.0
      - Pillow>=10.0.0
      - scikit-learn>=1.3.0
      - scipy>=1.11.0
      - pydicom>=2.4.0
      - wandb>=0.16.0
      - pyyaml>=6.0
      - tqdm>=4.66.0
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      - streamlit>=1.29.0
      - opencv-python>=4.8.0
      - pytest>=7.4.0
      - pytest-cov>=4.1.0
      - ruff==0.4.2
