version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  CXR-XAI-Clinical — Docker Compose
#
#  Services:
#    train   — GPU training (DenseNet-121 or ViT); run once per experiment
#    evaluate — CPU XAI evaluation after training
#    demo    — Streamlit demo on port 8501
#
#  Usage:
#    docker-compose up train               # full DenseNet-121 run
#    docker-compose run train \
#      --model vit_base_patch16_224        # ViT run
#    docker-compose run train --debug      # 20K-image debug run
#    docker-compose up demo                # launch Streamlit
#    docker-compose run evaluate \
#      --checkpoint results/checkpoints/best_densenet121.pt \
#      --model densenet121
# ─────────────────────────────────────────────────────────────────────────────

x-common-volumes: &common-volumes
  - ./data:/workspace/data:ro          # data read-only inside container
  - ./results:/workspace/results       # results written back to host
  - ./configs:/workspace/configs:ro

services:

  # ── GPU training ─────────────────────────────────────────────────────────
  train:
    build:
      context: .
      target: train
    image: cxr-xai:train
    volumes: *common-volumes
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["--config", "configs/train.yaml", "--model", "densenet121"]
    shm_size: "8gb"    # shared memory for DataLoader workers

  # ── XAI evaluation (CPU) ─────────────────────────────────────────────────
  evaluate:
    build:
      context: .
      target: demo     # reuse CPU image
    image: cxr-xai:demo
    volumes: *common-volumes
    entrypoint: ["python", "scripts/evaluate.py"]
    command:
      - "--config"
      - "configs/train.yaml"
      - "--xai-config"
      - "configs/xai.yaml"
      - "--checkpoint"
      - "results/checkpoints/best_densenet121.pt"
      - "--model"
      - "densenet121"

  # ── Streamlit demo ───────────────────────────────────────────────────────
  demo:
    build:
      context: .
      target: demo
    image: cxr-xai:demo
    volumes: *common-volumes
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
