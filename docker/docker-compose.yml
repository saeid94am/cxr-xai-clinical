version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  CXR-XAI-Clinical — Docker Compose
#
#  Run from the repo root:
#    docker compose -f docker/docker-compose.yml up train
#    docker compose -f docker/docker-compose.yml up demo
#    docker compose -f docker/docker-compose.yml run evaluate \
#      --checkpoint results/checkpoints/best_densenet121.pt \
#      --model densenet121
# ─────────────────────────────────────────────────────────────────────────────

x-common-volumes: &common-volumes
  - ../data:/workspace/data:ro          # data read-only inside container
  - ../results:/workspace/results       # results written back to host
  - ../configs:/workspace/configs:ro

services:

  # ── GPU training ─────────────────────────────────────────────────────────
  train:
    build:
      context: ..                        # repo root = build context
      dockerfile: docker/Dockerfile
      target: train
    image: cxr-xai:train
    volumes: *common-volumes
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["--config", "configs/train.yaml", "--model", "densenet121"]
    shm_size: "8gb"

  # ── XAI evaluation (CPU) ─────────────────────────────────────────────────
  evaluate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: demo
    image: cxr-xai:demo
    volumes: *common-volumes
    entrypoint: ["python", "scripts/evaluate.py"]
    command:
      - "--config"
      - "configs/train.yaml"
      - "--xai-config"
      - "configs/xai.yaml"
      - "--checkpoint"
      - "results/checkpoints/best_densenet121.pt"
      - "--model"
      - "densenet121"

  # ── Streamlit demo ───────────────────────────────────────────────────────
  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: demo
    image: cxr-xai:demo
    volumes: *common-volumes
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
