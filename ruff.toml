[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle, pyflakes, isort
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # imported but unused in __init__.py re-exports
]

[tool.ruff.lint.per-file-ignores]
"src/**/__init__.py" = ["F401"]  # re-exports are intentional
"tests/**" = ["F811"]            # pytest fixture redefinition OK
